<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NJ Admin Pro</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f8;}
.login{height:100vh;display:flex;justify-content:center;align-items:center;background:#667eea;}
.box{background:#fff;padding:25px;border-radius:10px;width:320px;}

.dashboard{display:none;}
.top{background:#fff;padding:15px;display:flex;justify-content:space-between;}

.container{display:flex;height:calc(100vh - 60px);}
.side{width:200px;background:#fff;padding:10px;}
.side button{width:100%;padding:10px;margin-bottom:5px;border:none;background:#eee;}
.side button.active{background:#667eea;color:#fff;}

.main{flex:1;padding:15px;overflow:auto;}

.card{background:#fff;padding:10px;margin:10px 0;border-radius:8px;}

table{width:100%;background:#fff;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid #eee;}

.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0008;}
.mbox{background:#fff;width:400px;margin:60px auto;padding:15px;border-radius:10px;}

input,select{width:100%;padding:8px;margin:5px 0;}
button{cursor:pointer;}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
<div class="box">
<h2>Admin Login</h2>
<input type="password" id="pin" placeholder="PIN">
<button onclick="login()">Login</button>
</div>
</div>

<!-- DASH -->
<div class="dashboard" id="dash">

<div class="top">
<h3>NJ Admin</h3>
<button onclick="logout()">Logout</button>
</div>

<div class="container">

<div class="side">
<button onclick="tab('home')">Dashboard</button>
<button onclick="tab('products')">Products</button>
<button onclick="tab('orders')">Orders</button>
<button onclick="tab('messages')">Messages</button>
</div>

<div class="main">

<!-- HOME -->
<div id="home">
<div class="card" id="stats">Loading...</div>
</div>

<!-- PRODUCTS -->
<div id="products" style="display:none;">
<input id="search" placeholder="Search products..." oninput="loadProducts()">
<button onclick="openModal()">+ Add Product</button>
<table>
<thead>
<tr><th>Name</th><th>Price</th><th>Stock</th><th></th></tr>
</thead>
<tbody id="plist"></tbody>
</table>
</div>

<!-- ORDERS -->
<div id="orders" style="display:none;">
<table>
<thead>
<tr><th>ID</th><th>Customer</th><th>Total</th><th>Status</th></tr>
</thead>
<tbody id="olist"></tbody>
</table>
</div>

<!-- MESSAGES -->
<div id="messages" style="display:none;">
<table>
<thead>
<tr><th>Name</th><th>Subject</th><th>Status</th></tr>
</thead>
<tbody id="mlist"></tbody>
</table>
</div>

</div>
</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="mbox">
<h3>Product</h3>

<input id="n" placeholder="Name">
<input id="p" placeholder="Price">
<input id="s" placeholder="Stock">
<input id="img" placeholder="Image URL">

<button onclick="save()">Save</button>
<button onclick="closeM()">Close</button>
</div>
</div>

<script>

const API = window.location.origin;
let editId = null;

/* LOGIN */
async function login(){
let pinValue = document.getElementById("pin").value;

let r = await fetch(API+"/api/admin/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({pin: pinValue})
});

if(r.ok){
document.getElementById("login").style.display="none";
document.getElementById("dash").style.display="block";
localStorage.setItem("admin","true");
loadAll();
}
else alert("Wrong PIN");
}

function logout(){
localStorage.removeItem("admin");
location.reload();
}

/* NAV */
function tab(id){
document.querySelectorAll(".main > div").forEach(d=>d.style.display="none");
document.getElementById(id).style.display="block";
}

/* LOAD ALL */
function loadAll(){
loadStats();
loadProducts();
loadOrders();
loadMessages();
}

/* STATS */
async function loadStats(){
let r = await fetch(API+"/api/stats");
let d = await r.json();

document.getElementById("stats").innerHTML = `
Products: ${d.total_products}<br>
Orders: ${d.total_orders}<br>
Revenue: ${d.total_revenue}<br>
Messages: ${d.total_messages}
`;
}

/* PRODUCTS */
async function loadProducts(){
let r = await fetch(API+"/api/products");
let d = await r.json();

let q = document.getElementById("search").value?.toLowerCase() || "";

document.getElementById("plist").innerHTML = d
.filter(p => p.name.toLowerCase().includes(q))
.map(p => `
<tr>
<td>${p.name}</td>
<td>${p.price}</td>
<td>${p.stock}</td>
<td>
<button onclick="edit(${p.id})">Edit</button>
<button onclick="del(${p.id})">X</button>
</td>
</tr>
`).join("");
}

function openModal(){
document.getElementById("modal").style.display="block";
editId=null;
}

function closeM(){
document.getElementById("modal").style.display="none";
}

/* SAFE EDIT */
async function edit(id){
let r = await fetch(API+"/api/products/"+id);
let p = await r.json();

editId = p.id;

document.getElementById("n").value = p.name;
document.getElementById("p").value = p.price;
document.getElementById("s").value = p.stock;
document.getElementById("img").value = p.image_url || "";

document.getElementById("modal").style.display="block";
}

/* SAVE PRODUCT */
async function save(){
let body = {
name: document.getElementById("n").value,
price: +document.getElementById("p").value,
stock: +document.getElementById("s").value,
category_id: 1,
image_url: document.getElementById("img").value,
description: ""
};

let url = editId ? `/api/products/${editId}` : "/api/products";
let method = editId ? "PUT" : "POST";

await fetch(API + url,{
method,
headers:{"Content-Type":"application/json"},
body:JSON.stringify(body)
});

closeM();
loadProducts();
}

/* DELETE */
async function del(id){
await fetch(API+"/api/products/"+id,{method:"DELETE"});
loadProducts();
}

/* ORDERS */
async function loadOrders(){
let r = await fetch(API+"/api/orders");
let d = await r.json();

document.getElementById("olist").innerHTML = d.map(o => `
<tr>
<td>${o.id}</td>
<td>${o.customer_name}</td>
<td>${o.total}</td>
<td>${o.status}</td>
</tr>
`).join("");
}

/* MESSAGES */
async function loadMessages(){
let r = await fetch(API+"/api/messages");
let d = await r.json();

document.getElementById("mlist").innerHTML = d.map(m => `
<tr>
<td>${m.sender_name}</td>
<td>${m.subject}</td>
<td>${m.is_read ? "Read" : "New"}</td>
</tr>
`).join("");
}

/* AUTO LOGIN */
if(localStorage.getItem("admin") === "true"){
document.getElementById("login").style.display="none";
document.getElementById("dash").style.display="block";
loadAll();
}

</script>

</body>
</html>
