<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NJ Admin Pro</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f8;}
.login{height:100vh;display:flex;justify-content:center;align-items:center;background:#667eea;}
.box{background:#fff;padding:25px;border-radius:10px;width:320px;}

.dashboard{display:none;}
.top{background:#fff;padding:15px;display:flex;justify-content:space-between;}

.container{display:flex;height:calc(100vh - 60px);}
.side{width:200px;background:#fff;padding:10px;}
.side button{width:100%;padding:10px;margin-bottom:5px;border:none;background:#eee;}
.side button.active{background:#667eea;color:#fff;}

.main{flex:1;padding:15px;overflow:auto;}

.card{background:#fff;padding:10px;margin:10px 0;border-radius:8px;}

table{width:100%;background:#fff;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid #eee;}

.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0008;}
.mbox{background:#fff;width:400px;margin:60px auto;padding:15px;border-radius:10px;}

input,select{width:100%;padding:8px;margin:5px 0;}
button{cursor:pointer;}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
<div class="box">
<h2>Admin Login</h2>
<input type="password" id="pin" placeholder="PIN">
<button onclick="login()">Login</button>
</div>
</div>

<!-- DASH -->
<div class="dashboard" id="dash">

<div class="top">
<h3>NJ Admin</h3>
<button onclick="logout()">Logout</button>
</div>

<div class="container">

<div class="side">
<button onclick="tab('home')" class="active">Dashboard</button>
<button onclick="tab('products')">Products</button>
<button onclick="tab('orders')">Orders</button>
<button onclick="tab('messages')">Messages</button>
</div>

<div class="main">

<!-- HOME -->
<div id="home">
<div class="card" id="stats">Loading...</div>
</div>

<!-- PRODUCTS -->
<div id="products" style="display:none;">
<input id="search" placeholder="Search products..." oninput="loadProducts()">
<button onclick="openModal()">+ Add Product</button>
<table>
<thead><tr><th>Name</th><th>Price</th><th>Stock</th><th></th></tr></thead>
<tbody id="plist"></tbody>
</table>
</div>

<!-- ORDERS -->
<div id="orders" style="display:none;">
<table>
<thead><tr><th>ID</th><th>Customer</th><th>Total</th><th>Status</th><th></th></tr></thead>
<tbody id="olist"></tbody>
</table>
</div>

<!-- MESSAGES -->
<div id="messages" style="display:none;">
<table>
<thead><tr><th>Name</th><th>Subject</th><th>Status</th><th></th></tr></thead>
<tbody id="mlist"></tbody>
</table>
</div>

</div>
</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="mbox">
<h3>Product</h3>
<input id="n" placeholder="Name">
<input id="p" placeholder="Price">
<input id="s" placeholder="Stock">
<input id="img" placeholder="Image URL">

<button onclick="save()">Save</button>
<button onclick="closeM()">Close</button>
</div>
</div>

<script>

const API="";

let editId=null;

/* LOGIN */
async function login(){
let r=await fetch(API+"/api/admin/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({pin:pin.value})
});

if(r.ok){
login.style.display="none";
dash.style.display="block";
loadAll();
}
else alert("Wrong PIN");
}

function logout(){location.reload();}

/* NAV */
function tab(id){
document.querySelectorAll(".main > div").forEach(d=>d.style.display="none");
document.getElementById(id).style.display="block";
}

/* LOAD ALL */
function loadAll(){
loadStats();
loadProducts();
loadOrders();
loadMessages();
}

/* STATS */
async function loadStats(){
let r=await fetch(API+"/api/stats");
let d=await r.json();
stats.innerHTML=`
Products: ${d.total_products}<br>
Orders: ${d.total_orders}<br>
Revenue: ${d.total_revenue}<br>
Messages: ${d.total_messages}
`;
}

/* PRODUCTS */
async function loadProducts(){
let r=await fetch(API+"/api/products");
let d=await r.json();

let q=document.getElementById("search").value?.toLowerCase()||"";

plist.innerHTML=d
.filter(p=>p.name.toLowerCase().includes(q))
.map(p=>`
<tr>
<td>${p.name}</td>
<td>${p.price}</td>
<td>${p.stock}</td>
<td>
<button onclick='edit(${JSON.stringify(p)})'>Edit</button>
<button onclick='del(${p.id})'>X</button>
</td>
</tr>
`).join("");
}

function openModal(){modal.style.display="block";editId=null;}
function closeM(){modal.style.display="none";}

function edit(p){
editId=p.id;
n.value=p.name;
p.value=p.price;
s.value=p.stock;
img.value=p.image_url;
modal.style.display="block";
}

async function save(){
let body={
name:n.value,
price:+p.value,
stock:+s.value,
category_id:1,
image_url:img.value,
description:""
};

let url=editId?`/api/products/${editId}`:"/api/products";
let method=editId?"PUT":"POST";

await fetch(API+url,{
method,
headers:{"Content-Type":"application/json"},
body:JSON.stringify(body)
});

closeM();
loadProducts();
}

async function del(id){
await fetch(API+"/api/products/"+id,{method:"DELETE"});
loadProducts();
}

/* ORDERS */
async function loadOrders(){
let r=await fetch(API+"/api/orders");
let d=await r.json();

olist.innerHTML=d.map(o=>`
<tr>
<td>${o.id}</td>
<td>${o.customer_name}</td>
<td>${o.total}</td>
<td>${o.status}</td>
<td>
<select onchange="updateOrder(${o.id},this.value)">
<option>${o.status}</option>
<option>pending</option>
<option>confirmed</option>
<option>shipped</option>
<option>delivered</option>
</select>
</td>
</tr>
`).join("");
}

async function updateOrder(id,status){
await fetch(API+`/api/orders/${id}/status`,{
method:"PATCH",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({status})
});
}

/* MESSAGES */
async function loadMessages(){
let r=await fetch(API+"/api/messages");
let d=await r.json();

mlist.innerHTML=d.map(m=>`
<tr>
<td>${m.sender_name}</td>
<td>${m.subject}</td>
<td>${m.is_read?"Read":"New"}</td>
<td>
<button onclick="mark(${m.id})">Mark</button>
</td>
</tr>
`).join("");
}

async function mark(id){
await fetch(API+`/api/messages/${id}/read`,{method:"PATCH"});
loadMessages();
}

if(localStorage.getItem("admin")){
login.style.display="none";
dash.style.display="block";
loadAll();
}

</script>

</body>
</html>
