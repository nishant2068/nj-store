<!-- REPLACE ONLY THIS PART INSIDE PRODUCT FORM -->

<div class="form-group">
    <label>Image URL</label>

    <input
        type="text"
        id="productImage"
        placeholder="Image URL will appear here"
        style="margin-bottom:10px;"
    >

    <!-- Preview -->
    <img
        id="imagePreview"
        src=""
        alt="Preview"
        style="width:100%;max-height:220px;object-fit:contain;border:1px solid #ddd;border-radius:8px;display:none;margin-bottom:10px;"
    >

    <!-- URL Button -->
    <button
        type="button"
        class="btn btn-primary"
        onclick="importImageFromUrl()"
        style="margin-bottom:10px;"
    >
        Import From URL
    </button>

    <!-- File Upload -->
    <input
        type="file"
        id="imageFileInput"
        accept="image/*"
        style="display:none"
        onchange="uploadImageFile(event)"
    >

    <button
        type="button"
        class="btn btn-success"
        onclick="document.getElementById('imageFileInput').click()"
        style="margin-bottom:10px;"
    >
        Upload From Device
    </button>

    <!-- Camera -->
    <div style="margin-top:10px;">
        <video
            id="cameraVideo"
            autoplay
            playsinline
            style="width:100%;border-radius:8px;display:none;background:black;"
        ></video>

        <canvas
            id="cameraCanvas"
            style="display:none;"
        ></canvas>

        <div style="display:flex;gap:10px;margin-top:10px;">
            <button
                type="button"
                class="btn btn-primary"
                onclick="startCamera()"
            >
                Start Camera
            </button>

            <button
                type="button"
                class="btn btn-success"
                onclick="capturePhoto()"
            >
                Capture
            </button>

            <button
                type="button"
                class="btn btn-cancel"
                onclick="stopCamera()"
            >
                Stop
            </button>
        </div>
    </div>
</div>

<script>
let cameraStream = null;

// ============================
// IMAGE PREVIEW
// ============================

function setImagePreview(url) {
    const preview = document.getElementById('imagePreview');

    if (!url) {
        preview.style.display = 'none';
        preview.src = '';
        return;
    }

    preview.src = url;
    preview.style.display = 'block';
}

// Live preview when typing
document.addEventListener('input', (e) => {
    if (e.target.id === 'productImage') {
        setImagePreview(e.target.value);
    }
});

// ============================
// IMPORT FROM URL
// ============================

async function importImageFromUrl() {
    const url = prompt('Enter image URL');

    if (!url) return;

    try {
        const res = await fetch('/api/upload-url', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ url })
        });

        const data = await res.json();

        if (!res.ok) {
            alert(data.detail || 'Upload failed');
            return;
        }

        document.getElementById('productImage').value = data.url;
        setImagePreview(data.url);

    } catch (err) {
        alert('Error importing image');
    }
}

// ============================
// FILE UPLOAD
// ============================

async function uploadImageFile(event) {
    const file = event.target.files[0];

    if (!file) return;

    const formData = new FormData();
    formData.append('file', file);

    try {
        const res = await fetch('/api/upload', {
            method: 'POST',
            body: formData
        });

        const data = await res.json();

        if (!res.ok) {
            alert('Upload failed');
            return;
        }

        document.getElementById('productImage').value = data.url;
        setImagePreview(data.url);

    } catch (err) {
        alert('Upload error');
    }
}

// ============================
// CAMERA
// ============================

async function startCamera() {
    try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
            video: true
        });

        const video = document.getElementById('cameraVideo');

        video.srcObject = cameraStream;
        video.style.display = 'block';

    } catch (err) {
        alert('Camera access denied');
    }
}

function stopCamera() {
    if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
    }

    document.getElementById('cameraVideo').style.display = 'none';
}

async function capturePhoto() {
    const video = document.getElementById('cameraVideo');
    const canvas = document.getElementById('cameraCanvas');

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext('2d');

    ctx.drawImage(video, 0, 0);

    const base64 = canvas.toDataURL('image/jpeg');

    try {
        const res = await fetch('/api/upload-base64', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                data: base64
            })
        });

        const data = await res.json();

        if (!res.ok) {
            alert('Camera upload failed');
            return;
        }

        document.getElementById('productImage').value = data.url;
        setImagePreview(data.url);

        stopCamera();

    } catch (err) {
        alert('Capture failed');
    }
}
</script>
